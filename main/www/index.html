<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e82127">
<title>tesla-key-esp32</title>
<style>
/*@@INLINE:style.css@@*/
</style>
</head>
<body>

<div class="wrap">

  <header class="top">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"/></svg></div>
    <div class="ttl">
      <h1>tesla-key-esp32</h1>
      <div class="sub"><span id="ipline"></span><span class="verlink" id="verLink" onclick="otaCheck()" title="Tap to check for updates">&mdash;</span><span class="otastat" id="otaStat"></span></div>
    </div>
  </header>

  <!-- re-pair notice -->
  <div class="banner warn" id="reauthBanner">
    <div class="bi">!</div>
    <div class="bt"></div>
  </div>

  <!-- status grid -->
  <div class="grid">
    <button class="tile tap" onclick="editVin()">
      <svg class="tedit" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      <div class="tlabel">Vehicle</div>
      <div class="tval mono" id="vehVal">&mdash;</div>
      <div class="tsub" id="vehSub"></div>
    </button>

    <button class="tile tap" onclick="genKey()">
      <svg class="tedit" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
      <div class="tlabel">Security key</div>
      <div class="tval mono" id="keyVal">&mdash;</div>
      <div class="tsub" id="keySub"></div>
    </button>

    <div class="tile wide">
      <div class="tlabel">Connections</div>
      <div class="conn">
        <div class="crow"><span class="ck" id="wifiLbl">Wi-Fi</span><span class="cv" id="wifiConn"><span class="ph">&mdash;</span></span></div>
        <div class="crow"><span class="ck">BLE</span><span class="cv" id="bleConn"><span class="ph">&mdash;</span></span></div>
        <button class="crow tap" onclick="editMqtt()" title="Tap to set the MQTT broker">
          <span class="ck">MQTT</span><span class="cv" id="mqttConn"><span class="ph">&mdash;</span></span>
          <svg class="cedit" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        </button>
        <button class="crow tap" onclick="editSyslog()" title="Tap to set the Syslog server">
          <span class="ck">Syslog</span><span class="cv" id="syslogConn"><span class="ph">&mdash;</span></span>
          <svg class="cedit" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- hero -->
  <div class="hero" id="hero">
    <div class="hicon" id="hicon"></div>
    <div class="hbody">
      <div class="hlabel" id="hlabel">&mdash;</div>
      <div class="hsub" id="hsub"></div>
      <div class="hstats" id="hstats"></div>
    </div>
  </div>

</div>

<div class="toasts" id="toasts"></div>

<script>
//@@INLINE:app.js@@
</script>
</body>
</html>
