name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Serialize main so the auto-incremented release version can't race between runs.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

# Least-privilege default for every job's GITHUB_TOKEN (logic-test only needs to
# read the checkout). The build/deploy jobs override this with the narrower set of
# write scopes they actually need (releases + Pages). See docs/SECURITY.md.
permissions:
  contents: read

jobs:
  # Fast, hardware-free gate: compile + run the host-side mock build (pure logic in
  # main/logic/) before the slow per-target firmware builds, so a logic regression
  # fails in seconds instead of after four ESP-IDF builds. See test/README.md.
  logic-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run host-side logic tests
        run: ./scripts/run-mock-tests.sh

  build:
    needs: logic-test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create tags + releases
      pages: write       # configure-pages / upload the Pages artifact
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need full history + tags for versioning and change detection

      - name: Compute release version
        id: version
        run: |
          git fetch --tags --force
          next="$(./scripts/next-version.sh)"
          latest="$(git tag -l 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')"
          echo "version=$next"   >> "$GITHUB_OUTPUT"
          echo "latest=$latest"  >> "$GITHUB_OUTPUT"
          echo "next=$next latest=${latest:-none}"

      - name: Detect firmware-relevant changes
        id: changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            changed=yes   # first push / unknown base → release to be safe
          elif git diff --name-only "$before" "${{ github.sha }}" \
               | grep -qE '^(main/|CMakeLists\.txt$|sdkconfig\.defaults$|partitions\.csv$|version\.txt$|\.github/workflows/build\.yml$|scripts/ci-build-all\.sh$|scripts/build-pages\.sh$)'; then
            changed=yes
          else
            changed=no
          fi
          echo "firmware=$changed" >> "$GITHUB_OUTPUT"
          echo "firmware-relevant change: $changed"

      # Stamp the embedded firmware version so esp_app_get_description()->version
      # (what running_version()/the OTA check compares) matches the release +
      # manifest version. version.txt is the git-committed FLOOR; here we overwrite
      # it in the workspace (NOT committed) with the version we are actually
      # publishing. Without this the binary is frozen at the version.txt floor while
      # the manifest auto-bumps, so OTA installs an image that still reports the old
      # version → endless "update available" and an apparent no-op.
      - name: Stamp firmware version
        id: stamp
        run: |
          if [ "${{ steps.changes.outputs.firmware }}" = "yes" ]; then
            disp="${{ steps.version.outputs.version }}"
          else
            disp="${{ steps.version.outputs.latest }}"
            [ -z "$disp" ] && disp="${{ steps.version.outputs.version }}"
          fi
          echo "$disp" > version.txt
          echo "disp=$disp" >> "$GITHUB_OUTPUT"
          echo "stamped firmware version: $disp"

      # Materialize the offline OTA signing key (RSA-3072, Secure Boot v2 scheme) from the
      # OTA_SIGNING_KEY secret into the workspace so ci-build-all.sh can sign each image (it
      # reads ota_signing_key.pem from the repo root by default). The file is gitignored and
      # shredded in the always() cleanup step below; the artifact/Pages globs never match it.
      # A real release (push to main with firmware changes) MUST be signed — fail loudly if the
      # secret is missing, rather than publishing an image that signed devices will reject. PR /
      # fork builds have no secret and intentionally build UNSIGNED (just a warning).
      - name: Provision OTA signing key
        env:
          OTA_SIGNING_KEY: ${{ secrets.OTA_SIGNING_KEY }}
        run: |
          if [ -n "$OTA_SIGNING_KEY" ]; then
            printf '%s\n' "$OTA_SIGNING_KEY" > ota_signing_key.pem
            chmod 600 ota_signing_key.pem
            echo "OTA signing key provisioned from secret."
          elif [ "${{ github.event_name }}" = "push" ] \
            && [ "${{ github.ref }}" = "refs/heads/main" ] \
            && [ "${{ steps.changes.outputs.firmware }}" = "yes" ]; then
            echo "::error::Refusing to publish an UNSIGNED release — set the OTA_SIGNING_KEY" \
                 "repository secret (RSA-3072 PEM, see docs/SECURITY.md)." >&2
            exit 1
          else
            echo "::warning::No OTA_SIGNING_KEY secret — building UNSIGNED (PR/fork build)."
          fi

      - name: Build firmware for all supported targets (ESP-IDF v5.5.4)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32
          # Build EVERY target yoziru/tesla-ble supports (esp32 / esp32s3 / esp32c3 /
          # esp32c6 — the Component Manager refuses any other chip) and stage per-target
          # bins. ci-build-all.sh set-targets each in turn, writes _fw/<target>/ for the
          # installer manifest and tesla-key-esp32[-<s3|c3|c6>].bin (+ versioned + merged) for
          # release / OTA. The `target:` input above is just the action's default; the
          # script overrides it per target. ONE source tree → N per-target images; the web
          # installer auto-selects by chip and OTA pulls tesla-key-esp32[-<s3|c3|c6>].bin.
          command: ./scripts/ci-build-all.sh "${{ steps.version.outputs.version }}"

      # Shred the signing key immediately after the build, even on failure, so it never
      # lingers in the workspace for later steps (artifact upload / Pages) to pick up.
      - name: Shred OTA signing key
        if: always()
        run: rm -f ota_signing_key.pem

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tesla-key-esp32-${{ steps.version.outputs.version }}
          # Per-target app images: stable (also the OTA filename), versioned, and merged.
          # Glob without the dash so the suffix-less classic-esp32 image (tesla-key-esp32.bin)
          # is captured alongside tesla-key-esp32-s3/-c3/-c6.bin.
          path: |
            tesla-key-esp32*.bin

      # Cut a release only when firmware-relevant files changed (source / deps /
      # esp-idf version / version.txt) — docs-only pushes redeploy Pages but don't
      # spawn a new firmware release.
      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.changes.outputs.firmware == 'yes'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          # Per-target app images (stable + versioned) and a single-file merged image per
          # target for manual full flashing — one set per supported chip. Glob without the
          # dash so the suffix-less classic-esp32 image (tesla-key-esp32.bin) is included.
          files: |
            tesla-key-esp32*.bin

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Assemble Pages site
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Same version stamped into the binary (steps.stamp) → installer label,
          # served firmware and manifest can never drift apart.
          ./scripts/build-pages.sh ./_site "${{ steps.stamp.outputs.disp }}"

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./_site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
