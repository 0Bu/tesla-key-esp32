name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Read firmware version
        id: version
        run: echo "version=$(tr -d '[:space:]' < version.txt)" >> "$GITHUB_OUTPUT"

      - name: Build firmware (ESP-IDF v5.5.4)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32s3
          # Build, then export the flashable parts SEPARATELY (bootloader @0x0,
          # partition table @0x8000, app @0x10000). ESP Web Tools writes these at
          # their own offsets, so an UPDATE never touches the nvs partition (0x9000)
          # → WiFi / VIN / key survive upgrades. The merged image is kept only as a
          # convenience for full flashes of brand-new devices. App is versioned from
          # version.txt.
          command: >-
            idf.py set-target esp32s3 build &&
            cd build &&
            cp bootloader/bootloader.bin ../bootloader.bin &&
            cp partition_table/partition-table.bin ../partition-table.bin &&
            cp tesla-key-esp32.bin ../tesla-key-esp32-${{ steps.version.outputs.version }}.bin &&
            esptool.py --chip esp32s3 merge_bin -o ../tesla-key-esp32-${{ steps.version.outputs.version }}-merged.bin "@flash_args"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tesla-key-esp32-${{ steps.version.outputs.version }}
          path: |
            bootloader.bin
            partition-table.bin
            tesla-key-esp32-${{ steps.version.outputs.version }}.bin
            tesla-key-esp32-${{ steps.version.outputs.version }}-merged.bin

      - name: Attach firmware to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            bootloader.bin
            partition-table.bin
            tesla-key-esp32-${{ steps.version.outputs.version }}.bin
            tesla-key-esp32-${{ steps.version.outputs.version }}-merged.bin
