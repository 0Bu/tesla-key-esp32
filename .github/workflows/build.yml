name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Serialize main so the auto-incremented release version can't race between runs.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create tags + releases
      pages: write       # configure-pages / upload the Pages artifact
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need full history + tags for versioning and change detection

      - name: Compute release version
        id: version
        run: |
          git fetch --tags --force
          next="$(./scripts/next-version.sh)"
          latest="$(git tag -l 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')"
          echo "version=$next"   >> "$GITHUB_OUTPUT"
          echo "latest=$latest"  >> "$GITHUB_OUTPUT"
          echo "next=$next latest=${latest:-none}"

      - name: Detect firmware-relevant changes
        id: changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            changed=yes   # first push / unknown base → release to be safe
          elif git diff --name-only "$before" "${{ github.sha }}" \
               | grep -qE '^(main/|CMakeLists\.txt$|sdkconfig\.defaults$|partitions\.csv$|version\.txt$|\.github/workflows/build\.yml$)'; then
            changed=yes
          else
            changed=no
          fi
          echo "firmware=$changed" >> "$GITHUB_OUTPUT"
          echo "firmware-relevant change: $changed"

      # Stamp the embedded firmware version so esp_app_get_description()->version
      # (what running_version()/the OTA check compares) matches the release +
      # manifest version. version.txt is the git-committed FLOOR; here we overwrite
      # it in the workspace (NOT committed) with the version we are actually
      # publishing. Without this the binary is frozen at the version.txt floor while
      # the manifest auto-bumps, so OTA installs an image that still reports the old
      # version → endless "update available" and an apparent no-op.
      - name: Stamp firmware version
        id: stamp
        run: |
          if [ "${{ steps.changes.outputs.firmware }}" = "yes" ]; then
            disp="${{ steps.version.outputs.version }}"
          else
            disp="${{ steps.version.outputs.latest }}"
            [ -z "$disp" ] && disp="${{ steps.version.outputs.version }}"
          fi
          echo "$disp" > version.txt
          echo "disp=$disp" >> "$GITHUB_OUTPUT"
          echo "stamped firmware version: $disp"

      - name: Build firmware (ESP-IDF v5.5.4)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32s3
          # Build, then export the flashable parts SEPARATELY (bootloader @0x0,
          # partition table @0x8000, app @0x20000). ESP Web Tools writes these at
          # their own offsets, so an UPDATE never touches the nvs partition (0x9000)
          # → WiFi / VIN / key survive upgrades. tesla-key-esp32.bin is the stable
          # name the web installer reads; the versioned + merged copies are release
          # downloads for manual / full flashing.
          command: >-
            idf.py set-target esp32s3 build &&
            cd build &&
            cp bootloader/bootloader.bin ../bootloader.bin &&
            cp partition_table/partition-table.bin ../partition-table.bin &&
            cp tesla-key-esp32.bin ../tesla-key-esp32.bin &&
            cp tesla-key-esp32.bin ../tesla-key-esp32-${{ steps.version.outputs.version }}.bin &&
            esptool.py --chip esp32s3 merge_bin -o ../tesla-key-esp32-${{ steps.version.outputs.version }}-merged.bin "@flash_args"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tesla-key-esp32-${{ steps.version.outputs.version }}
          path: |
            bootloader.bin
            partition-table.bin
            tesla-key-esp32.bin
            tesla-key-esp32-${{ steps.version.outputs.version }}.bin
            tesla-key-esp32-${{ steps.version.outputs.version }}-merged.bin

      # Cut a release only when firmware-relevant files changed (source / deps /
      # esp-idf version / version.txt) — docs-only pushes redeploy Pages but don't
      # spawn a new firmware release.
      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.changes.outputs.firmware == 'yes'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            bootloader.bin
            partition-table.bin
            tesla-key-esp32.bin
            tesla-key-esp32-${{ steps.version.outputs.version }}.bin
            tesla-key-esp32-${{ steps.version.outputs.version }}-merged.bin

      - name: Configure Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Assemble Pages site
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Same version stamped into the binary (steps.stamp) → installer label,
          # served firmware and manifest can never drift apart.
          ./scripts/build-pages.sh ./_site "${{ steps.stamp.outputs.disp }}"

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./_site

  # Compile gate for the LilyGo T-Dongle-C5 (ESP32-C5) target. Build-only — does
  # not publish a release or Pages (the ESP32-S3 remains the released firmware).
  #
  # KNOWN-BLOCKED (non-blocking): yoziru/tesla-ble v5.1.1 omits `esp32c5` from its
  # component-manifest `targets` (lists esp32/s3/c3/c6), so the component manager
  # refuses the target before compilation. It's a manifest-only gap — the crypto
  # is portable C/mbedTLS and the near-identical esp32c6 is supported. This job is
  # `continue-on-error` so it doesn't gate the workflow; flip it back to blocking
  # once a tesla-ble release/fork adds esp32c5 to `targets`.
  build-c5:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build firmware for ESP32-C5 (ESP-IDF v5.5.4)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32c5
          command: idf.py set-target esp32c5 build

      - name: Upload C5 firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: tesla-key-esp32-c5-dev
          path: build/tesla-key-esp32.bin
          if-no-files-found: warn

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
