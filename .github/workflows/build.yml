name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual re-publish lever: a main run can fail in its LAST step on a transient GitHub
  # Pages error ("Deployment failed, try again later."). Dispatching on main rebuilds and
  # republishes the Pages site (installer + OTA manifest) at the LATEST released version —
  # it never cuts a new release (that stays push-only via the changes-detect step).
  workflow_dispatch:

# Serialize main so the auto-incremented release version can't race between runs.
# PR branches don't release/version, so cancel superseded runs there to save CI time on
# rapid push sequences — the per-ref group keeps main (refs/heads/main) serialized as before.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least-privilege default for every job's GITHUB_TOKEN (logic-test only needs to
# read the checkout). The build/deploy jobs override this with the narrower set of
# write scopes they actually need (releases + Pages). See docs/SECURITY.md.
permissions:
  contents: read

jobs:
  # Fast, hardware-free gate: compile + run the host-side mock build (pure logic in
  # main/logic/) before the slow per-target firmware builds, so a logic regression
  # fails in seconds instead of after four ESP-IDF builds. See test/README.md.
  logic-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run host-side logic tests
        run: ./scripts/run-mock-tests.sh

  build:
    needs: logic-test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create tags + releases
      pages: write       # configure-pages / upload the Pages artifact
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # need full history + tags for versioning and change detection

      # Persist the ccache dir that ci-build-all.sh writes (.ccache, inside the workspace
      # so it survives the container mount) across CI runs. The five cold ESP-IDF builds —
      # framework + tesla-ble + our sources, once per target — dominate wall-clock; a warm
      # ccache turns most of that into cache hits. Key per-commit (cache keys are immutable,
      # so a fresh entry is saved each run); restore-keys falls back to the newest prior
      # cache for a warm start. Bump the idf5.5.4 tag in lockstep with the ESP-IDF version
      # below so a toolchain change starts from a clean cache.
      - name: Cache ccache (ESP-IDF compiler cache)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-idf5.5.4-${{ github.sha }}
          restore-keys: |
            ccache-idf5.5.4-

      - name: Compute release version
        id: version
        run: |
          git fetch --tags --force
          next="$(./scripts/next-version.sh)"
          latest="$(git tag -l 'v*' --sort=-v:refname | head -n1 | sed 's/^v//')"
          echo "version=$next"   >> "$GITHUB_OUTPUT"
          echo "latest=$latest"  >> "$GITHUB_OUTPUT"
          echo "next=$next latest=${latest:-none}"

      - name: Detect firmware-relevant changes
        id: changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            changed=yes   # first push / unknown base → release to be safe
          elif git diff --name-only "$before" "${{ github.sha }}" \
               | grep -qE '^(main/|CMakeLists\.txt$|sdkconfig\.defaults(\.[a-z0-9]+)?$|partitions\.csv$|version\.txt$|\.github/workflows/build\.yml$|scripts/ci-build-all\.sh$|scripts/build-pages\.sh$|scripts/prepare-tesla-ble-c5\.sh$)'; then
            changed=yes
          else
            changed=no
          fi
          echo "firmware=$changed" >> "$GITHUB_OUTPUT"
          echo "firmware-relevant change: $changed"

      # Stamp the embedded firmware version so esp_app_get_description()->version
      # (what running_version()/the OTA check compares) matches the release +
      # manifest version. version.txt is the git-committed FLOOR; here we overwrite
      # it in the workspace (NOT committed) with the version we are actually
      # publishing. Without this the binary is frozen at the version.txt floor while
      # the manifest auto-bumps, so OTA installs an image that still reports the old
      # version → endless "update available" and an apparent no-op.
      - name: Stamp firmware version
        id: stamp
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR preview build: base on the newest RELEASED tag (not `next`) + a -PR-<N>
            # prerelease suffix, e.g. 1.4.30-PR-157. ver_newer() (ota_update.cpp) parses only
            # x.y.z and IGNORES the suffix, so the base MUST be the latest release: a future
            # main release (1.4.31) then compares strictly-newer and the PR-flashed device
            # OTA-updates to main, while `1.4.30` shows "up to date" during testing. A `next`
            # base (1.4.31) would collide with the number the merge cuts → no OTA. See
            # docs/ARCHITECTURE.md (PR preview installer).
            base="${{ steps.version.outputs.latest }}"
            [ -z "$base" ] && base="${{ steps.version.outputs.version }}"
            disp="${base}-PR-${{ github.event.pull_request.number }}"
          elif [ "${{ steps.changes.outputs.firmware }}" = "yes" ]; then
            disp="${{ steps.version.outputs.version }}"
          else
            disp="${{ steps.version.outputs.latest }}"
            [ -z "$disp" ] && disp="${{ steps.version.outputs.version }}"
          fi
          echo "$disp" > version.txt
          echo "disp=$disp" >> "$GITHUB_OUTPUT"
          echo "stamped firmware version: $disp"

      # Materialize the offline OTA signing key (RSA-3072, Secure Boot v2 scheme) from the
      # OTA_SIGNING_KEY secret so ci-build-all.sh can sign each image (it reads
      # ota_signing_key.pem from the repo root by default). The file is gitignored and shredded
      # in the always() cleanup step below; the artifact/Pages globs never match it.
      #
      # Runs on a push/dispatch on main (the paths that PUBLISH bins — a GitHub release and/or
      # the GitHub Pages OTA channel that build-pages.sh redeploys on every main push and on a
      # manual re-publish dispatch) AND on pull_request, so a PR uploads a *signed*, boot-able
      # artifact you can flash to try the change before merge (an unsigned image abort()s in a
      # reboot loop on a signed-build device — see docs/SECURITY.md). GitHub hands the secret
      # to same-repo (branch) PRs but NOT to fork PRs:
      #   - main publish, no secret  → hard error (never publish unsigned firmware to OTA).
      #   - PR, no secret (fork)     → warn + build UNSIGNED (compile-only check, not flashable).
      #   - otherwise                → sign in place; the size gate's 64 KB headroom absorbs the
      #                                ~4 KB signature block.
      - name: Provision OTA signing key
        id: signkey
        if: >-
          ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main')
          || github.event_name == 'pull_request'
        env:
          OTA_SIGNING_KEY: ${{ secrets.OTA_SIGNING_KEY }}
        run: |
          if [ -z "$OTA_SIGNING_KEY" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "signed=false" >> "$GITHUB_OUTPUT"
              echo "::warning::No OTA_SIGNING_KEY available (fork PR?) — building UNSIGNED." \
                   "This PR artifact will NOT boot when flashed onto a signed-build device," \
                   "so no PR preview will be published."
              exit 0
            fi
            echo "::error::Refusing to publish UNSIGNED firmware to the OTA channel — set the" \
                 "OTA_SIGNING_KEY repository secret (RSA-3072 PEM, see docs/SECURITY.md)." >&2
            exit 1
          fi
          printf '%s\n' "$OTA_SIGNING_KEY" > ota_signing_key.pem
          chmod 600 ota_signing_key.pem
          echo "signed=true" >> "$GITHUB_OUTPUT"
          echo "OTA signing key provisioned from secret."

      - name: Build firmware for all supported targets (ESP-IDF v5.5.4)
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.4
          target: esp32
          # Build every supported target and stage per-target bins. esp32 / esp32s3 / esp32c3 /
          # esp32c6 are what yoziru/tesla-ble supports (the Component Manager refuses any other
          # chip); esp32c5 is added via a local build-time patch of tesla-ble (ci-build-all.sh
          # runs scripts/prepare-tesla-ble-c5.sh first). ci-build-all.sh set-targets each in turn,
          # writes _fw/<target>/ for the installer manifest and tesla-key-esp32[-<s3|c3|c6|c5>].bin
          # (+ versioned + merged) for release / OTA. The `target:` input above is just the action's
          # default; the script overrides it per target. ONE source tree → N per-target images; the
          # web installer auto-selects by chip and OTA pulls tesla-key-esp32[-<s3|c3|c6|c5>].bin.
          command: ./scripts/ci-build-all.sh "${{ steps.version.outputs.version }}"

      # Shred the signing key immediately after the build, even on failure, so it never
      # lingers in the workspace for later steps (artifact upload / Pages) to pick up.
      - name: Shred OTA signing key
        if: always()
        run: rm -f ota_signing_key.pem

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # PR builds get a "pr<N>-" prefix so a pre-merge test artifact is self-describing
          # (grab it with `gh run download` / from the run's Artifacts). Main builds keep the
          # bare version name.
          name: >-
            ${{ github.event_name == 'pull_request'
                && format('tesla-key-esp32-pr{0}-{1}', github.event.pull_request.number, steps.version.outputs.version)
                || format('tesla-key-esp32-{0}', steps.version.outputs.version) }}
          # Per-target app images: stable (also the OTA filename), versioned, and merged.
          # Glob without the dash so the suffix-less classic-esp32 image (tesla-key-esp32.bin)
          # is captured alongside tesla-key-esp32-s3/-c3/-c6/-c5.bin.
          path: |
            tesla-key-esp32*.bin

      # PR preview installer: publish this PR's signed build to the gh-pages branch under
      # PR/<N>/ so https://0bu.github.io/tesla-key-esp32/#<N> (which redirects to PR/<N>/)
      # can browser-flash it before merge. Same-origin bins + a per-PR manifest.json, exactly
      # like the root site (build-pages.sh is reused verbatim). Signed-only (steps.signkey):
      # an unsigned/fork PR build would crash-loop at boot, so we never publish one. The device
      # OTA URL is compile-time and unchanged, so a PR-flashed device still updates from MAIN,
      # not from its own preview. Cleaned up on PR close by pr-preview-cleanup.yml.
      - name: Assemble PR preview site
        if: github.event_name == 'pull_request' && steps.signkey.outputs.signed == 'true'
        # Assets only (manifest + bins) — a PR preview is reached via the root page's picker /
        # #<N> deep-link, so it needs no index.html or docs of its own.
        env:
          PAGES_ASSETS_ONLY: "1"
        run: ./scripts/build-pages.sh ./_pr_site "${{ steps.stamp.outputs.disp }}"

      - name: Publish PR preview to gh-pages (PR/<N>/)
        if: github.event_name == 'pull_request' && steps.signkey.outputs.signed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Title via env, NOT inline ${{ }}, so an attacker-controlled PR title can't inject
          # into the run script. Number + version are integer/CI-controlled and safe inline.
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: >-
          ./scripts/publish-pages-branch.sh pr ./_pr_site
          "${{ github.event.pull_request.number }}" "$PR_TITLE" "${{ steps.stamp.outputs.disp }}"

      # Cut a release only when firmware-relevant files changed (source / deps /
      # esp-idf version / version.txt) — docs-only pushes redeploy Pages but don't
      # spawn a new firmware release.
      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.changes.outputs.firmware == 'yes'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          # Per-target app images (stable + versioned) and a single-file merged image per
          # target for manual full flashing — one set per supported chip. Glob without the
          # dash so the suffix-less classic-esp32 image (tesla-key-esp32.bin) is included.
          files: |
            tesla-key-esp32*.bin

      - name: Configure Pages
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Assemble Pages site
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          # Same version stamped into the binary (steps.stamp) → installer label,
          # served firmware and manifest can never drift apart.
          ./scripts/build-pages.sh ./_site "${{ steps.stamp.outputs.disp }}"

      # Mirror the root site onto the gh-pages branch (preserving the PR/ preview tree that
      # PR runs push). This is INERT until GitHub Pages' source is switched from "GitHub
      # Actions" to "Deploy from branch: gh-pages" — until then the Actions artifact below is
      # still the live site, so this migration adds zero downtime. Once switched, gh-pages
      # serves both the root installer and the per-PR previews from one origin (required: the
      # browser flasher fetches parts same-origin, GitHub release assets have no CORS).
      - name: Publish site to gh-pages (root)
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/publish-pages-branch.sh root ./_site

      - name: Upload Pages artifact
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: ./_site

  deploy:
    needs: build
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry.outputs.page_url }}
    steps:
      # GitHub Pages sometimes fails a deployment server-side seconds after creating it
      # ("Deployment failed, try again later.") with the artifact perfectly fine — that
      # left main red at the very last step while release + bins were already published.
      # Absorb ONE such transient failure with a spaced second attempt; a persistent
      # problem still fails the job on the retry.
      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
      - name: Wait before retrying the Pages deployment
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - name: Retry deploy to GitHub Pages
        id: deployment-retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
