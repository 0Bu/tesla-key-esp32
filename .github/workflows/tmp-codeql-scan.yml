# TEMPORARY — reproduces the default-setup CodeQL scan and prints every alert into the
# job log (the session cannot read the code-scanning API). Deleted before the PR opens.
name: tmp-codeql-scan

on:
  push:
    branches: [claude/tesla-key-esp32-security-ozx8eg]

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: none
          - language: javascript-typescript
          - language: python
          - language: actions
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          upload: never
          output: sarif-results
      - name: Print alerts
        run: |
          for f in sarif-results/*.sarif; do
            echo "===SARIF=== $f"
            jq -r '.runs[] as $run | $run.tool.driver.rules as $rules | $run.results[]
              | (.rule.index // .ruleIndex // 0) as $ri
              | "ALERT|\(.ruleId)|\(.level // "note")|\($rules[$ri].properties["security-severity"] // $rules[$ri].properties["problem.severity"] // "-")|\(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine // 0)-\(.locations[0].physicalLocation.region.endLine // 0)|\(.message.text | gsub("\n"; " "))"' "$f" \
              || echo "JQ-FAILED for $f"
            echo "===END=== $f"
          done
